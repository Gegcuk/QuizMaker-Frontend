name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate frontend before deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: quizmaker-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quizmaker-frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:production

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Browser smoke test
        run: npm run test:smoke

      - name: Build
        run: npm run build

  deploy:
    name: Deploy frontend to production
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quizmaker-frontend/package-lock.json

      - name: Install deps
        working-directory: quizmaker-frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: quizmaker-frontend
        run: npx playwright install --with-deps chromium

      - name: Validate deployment configuration
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0

          for name in VITE_API_BASE_URL VITE_SITE_URL SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "❌ Missing ${name} secret"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build (with prerender)
        working-directory: quizmaker-frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          set -euo pipefail
          npm run build:prerender

      - name: Prepare deployment bundle
        run: |
          rm -rf deployment && mkdir -p deployment
          cp -r quizmaker-frontend/dist deployment/
          cp quizmaker-frontend/Dockerfile deployment/
          cp quizmaker-frontend/docker-compose.yml deployment/
          cp quizmaker-frontend/nginx.conf deployment/

      - name: Stop old app and prepare directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/quizzence || mkdir -p /var/www/quizzence
            cd /var/www/quizzence
            docker compose down || docker-compose down || true
            rm -rf dist/ docker-compose.yml Dockerfile nginx.conf

      - name: Copy deployment bundle
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: deployment/
          remote_path: /var/www/quizzence/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Verify deployment files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/quizzence
            echo "=== Deployment directory contents ==="
            ls -la
            echo ""
            echo "=== Verifying required files ==="
            test -f dist/index.html || { echo "❌ dist/index.html missing"; exit 1; }
            test -f Dockerfile || { echo "❌ Dockerfile missing"; exit 1; }
            test -f docker-compose.yml || { echo "❌ docker-compose.yml missing"; exit 1; }
            test -f nginx.conf || { echo "❌ nginx.conf missing"; exit 1; }
            echo "✅ All required files present"
            
      - name: Build and start containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/quizzence

            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
            else
              compose() { docker-compose "$@"; }
            fi

            compose build --no-cache
            compose up -d
            echo ""
            echo "=== Container status ==="
            compose ps

            container_id="$(compose ps -q quizzence-frontend)"
            if [ -z "$container_id" ]; then
              echo "❌ quizzence-frontend container was not created"
              exit 1
            fi

            ready=0
            for attempt in $(seq 1 30); do
              health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
              echo "Frontend health (${attempt}/30): ${health}"

              if [ "$health" = "healthy" ]; then
                ready=1
                break
              fi

              if [ "$health" = "unhealthy" ] || [ "$health" = "exited" ]; then
                docker logs --tail 100 "$container_id"
                exit 1
              fi

              sleep 2
            done

            if [ "$ready" -ne 1 ]; then
              echo "❌ quizzence-frontend did not become healthy"
              docker logs --tail 100 "$container_id"
              exit 1
            fi

      - name: Smoke check production site
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          set -euo pipefail
          site_url="${VITE_SITE_URL%/}"

          for path in "/" "/login"; do
            url="${site_url}${path}"
            echo "Checking ${url}"
            curl --fail --silent --show-error --location \
              --retry 5 --retry-delay 10 --retry-all-errors \
              --max-time 30 \
              "$url" > /dev/null
          done
