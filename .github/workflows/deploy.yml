name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate frontend before deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: quizmaker-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quizmaker-frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:production

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: SEO build contract test
        run: npm run test:seo

      - name: Browser smoke test
        run: npm run test:smoke

      - name: Critical E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Validate deployment workflow policy
        run: npm run test:deployment-policy

      - name: Validate Nginx route policy
        run: npm run test:nginx

  deploy:
    name: Deploy frontend to production
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quizmaker-frontend/package-lock.json

      - name: Install deps
        working-directory: quizmaker-frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: quizmaker-frontend
        run: npx playwright install --with-deps chromium

      - name: Validate deployment configuration
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0

          for name in VITE_API_BASE_URL VITE_SITE_URL SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "❌ Missing ${name} secret"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build (with prerender)
        working-directory: quizmaker-frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          set -euo pipefail
          npm run build:prerender

      - name: Prepare deployment bundle
        run: |
          rm -rf deployment && mkdir -p deployment
          cp -r quizmaker-frontend/dist deployment/
          cp quizmaker-frontend/Dockerfile deployment/
          cp quizmaker-frontend/docker-compose.yml deployment/
          cp quizmaker-frontend/nginx.conf deployment/
          cp quizmaker-frontend/.dockerignore deployment/

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /var/www/quizzence

      - name: Copy deployment bundle
        uses: burnett01/rsync-deployments@9.0.0
        with:
          switches: -avzr --delete
          path: deployment/
          remote_path: /var/www/quizzence/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Verify deployment files
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/quizzence
            echo "=== Deployment directory contents ==="
            ls -la
            echo ""
            echo "=== Verifying required files ==="
            test -f dist/index.html || { echo "❌ dist/index.html missing"; exit 1; }
            test -f Dockerfile || { echo "❌ Dockerfile missing"; exit 1; }
            test -f docker-compose.yml || { echo "❌ docker-compose.yml missing"; exit 1; }
            test -f nginx.conf || { echo "❌ nginx.conf missing"; exit 1; }
            test -f .dockerignore || { echo "❌ .dockerignore missing"; exit 1; }
            echo "✅ All required files present"
            
      - name: Build and start containers
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/quizzence

            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
            else
              compose() { docker-compose "$@"; }
            fi

            build_succeeded=0
            for attempt in 1 2 3; do
              echo "Building frontend image (attempt ${attempt}/3)"
              if compose build --no-cache; then
                build_succeeded=1
                break
              fi

              if [ "$attempt" -lt 3 ]; then
                echo "Frontend image build failed; waiting 15 seconds before retrying."
                sleep 15
              fi
            done

            if [ "$build_succeeded" -ne 1 ]; then
              echo "❌ Frontend image build failed; keeping the current production container running."
              exit 1
            fi

            compose down
            compose up -d --no-build
            echo ""
            echo "=== Container status ==="
            compose ps

            container_id="$(compose ps -q quizzence-frontend)"
            if [ -z "$container_id" ]; then
              echo "❌ quizzence-frontend container was not created"
              exit 1
            fi

            ready=0
            for attempt in $(seq 1 30); do
              health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
              echo "Frontend health (${attempt}/30): ${health}"

              if [ "$health" = "healthy" ]; then
                ready=1
                break
              fi

              if [ "$health" = "unhealthy" ] || [ "$health" = "exited" ]; then
                docker logs --tail 100 "$container_id"
                exit 1
              fi

              sleep 2
            done

            if [ "$ready" -ne 1 ]; then
              echo "❌ quizzence-frontend did not become healthy"
              docker logs --tail 100 "$container_id"
              exit 1
            fi

            assert_status() {
              expected="$1"
              path="$2"
              status="$(curl --silent --output /dev/null --write-out '%{http_code}' "http://127.0.0.1:3000${path}")"

              if [ "$status" != "$expected" ]; then
                echo "❌ Expected ${path} to return ${expected}, got ${status}"
                exit 1
              fi
            }

            assert_status 200 "/"
            assert_status 200 "/login"
            assert_status 200 "/quizzes/22222222-2222-4222-8222-222222222222/attempt?attemptId=33333333-3333-4333-8333-333333333333"
            assert_status 200 "/sitemap_articles.xml"
            assert_status 404 "/this-route-should-not-exist"
            assert_status 404 "/assets/this-asset-does-not-exist.js"

            private_robots="$(curl --silent --show-error --head "http://127.0.0.1:3000/my-quizzes" | tr -d '\r' | awk 'tolower($1) == "x-robots-tag:" { print $2 " " $3; exit }')"
            if [ "$private_robots" != "noindex, nofollow" ]; then
              echo "❌ Expected /my-quizzes to return X-Robots-Tag noindex, nofollow"
              exit 1
            fi

            article_sitemap="$(curl --fail --silent --show-error "http://127.0.0.1:3000/sitemap_articles.xml")"
            if ! printf '%s' "$article_sitemap" | grep -q '<loc>'; then
              echo "❌ Expected sitemap_articles.xml to contain an article URL"
              exit 1
            fi

      - name: Smoke check production site
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          set -euo pipefail
          site_url="${VITE_SITE_URL%/}"

          for path in "/" "/login"; do
            url="${site_url}${path}"
            echo "Checking ${url}"
            curl --fail --silent --show-error --location \
              --retry 5 --retry-delay 10 --retry-all-errors \
              --max-time 30 \
            "$url" > /dev/null
          done

          hsts_policy="$(curl --fail --silent --show-error --head \
            --retry 5 --retry-delay 10 --retry-all-errors \
            --max-time 30 \
            "${site_url}/" | tr -d '\r' | awk 'tolower($1) == "strict-transport-security:" { print $2; exit }')"
          if [ "$hsts_policy" != "max-age=2592000" ]; then
            echo "❌ Expected production HSTS policy max-age=2592000, got ${hsts_policy:-missing}"
            exit 1
          fi

          not_found_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "${site_url}/this-route-should-not-exist")"
          if [ "$not_found_status" != "404" ]; then
            echo "❌ Expected production unknown route to return 404, got ${not_found_status}"
            exit 1
          fi

          private_robots="$(curl --fail --silent --show-error --head \
            --retry 5 --retry-delay 10 --retry-all-errors \
            --max-time 30 \
            "${site_url}/my-quizzes" | tr -d '\r' | awk 'tolower($1) == "x-robots-tag:" { print $2 " " $3; exit }')"
          if [ "$private_robots" != "noindex, nofollow" ]; then
            echo "❌ Expected production /my-quizzes to return X-Robots-Tag noindex, nofollow"
            exit 1
          fi

          article_sitemap="$(curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 10 --retry-all-errors \
            --max-time 30 \
            "${site_url}/sitemap_articles.xml")"
          if ! printf '%s' "$article_sitemap" | grep -q '<loc>'; then
            echo "❌ Expected production sitemap_articles.xml to contain an article URL"
            exit 1
          fi
