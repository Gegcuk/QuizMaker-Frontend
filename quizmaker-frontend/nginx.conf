server {
    listen 80;
    server_name quizzence.com www.quizzence.com;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Cloudflare terminates public TLS and forwards this origin header. Keep a 30-day rollback window;
    # do not include subdomains or preload until every affected hostname has been audited.
    add_header Strict-Transport-Security "max-age=2592000" always;

    # Serve the existing app shell for unknown documents without changing their URL or 404 status.
    location = /__not-found-shell {
        internal;
        alias /usr/share/nginx/html/index.html;
        default_type text/html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=2592000" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Static assets and public crawl files must never fall through to the SPA shell.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.xml$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Public SPA routes and prerendered pages.
    location = / {
        try_files /index.html =404;
    }

    # try_files fallbacks internally redirect here; keep the SPA shell reachable only from allowlisted routes.
    location = /index.html {
        try_files /index.html =404;
    }

    location = /blog {
        return 301 https://$host/blog/;
    }

    # Preserve canonical trailing slashes for article URLs.
    location ~ ^/blog/([^/]+)$ {
        return 301 https://$host/blog/$1/;
    }

    location ~ ^/blog/(?:[^/]+/)?$ {
        try_files $uri $uri/ /index.html;
    }

    location = /sitemap_articles.xml {
        try_files /index.html =404;
    }

    location ~ ^/(?:login|register|forgot-password|reset-password|verify-email|oauth/callback|oauth2/redirect|theme-demo|terms|privacy|faq|values|roadmap)/?$ {
        try_files $uri $uri/ /index.html;
    }

    # Authenticated SPA routes remain directly navigable without granting a blanket fallback.
    location ~ ^/quizzes/?$ {
        try_files /index.html =404;
    }

    location ~ ^/quizzes/[^/]+(?:/(?:attempt(?:/start)?|results|edit|results-summary|questions|generation))?/?$ {
        try_files /index.html =404;
    }

    location ~ ^/(?:my-quizzes|tags|categories|questions|bug-reports|ai-analysis|form-test|profile|settings|billing(?:/(?:success|cancel))?|my-attempts)/?$ {
        try_files /index.html =404;
    }

    location ~ ^/documents(?:/(?:upload|[^/]+))?/?$ {
        try_files /index.html =404;
    }

    # Unknown paths and malformed route shapes receive a real 404 instead of index.html.
    location / {
        error_page 404 =404 /__not-found-shell;
        return 404;
    }
}
